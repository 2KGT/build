name: "Clean Change Branch"

on:
  workflow_dispatch:
    inputs:
      branch_to_delete:
        description: "Nhập chính xác tên nhánh muốn xóa sổ (VD: branh x )"
        required: true
        type: string

jobs:
  purge:
    runs-on: ubuntu-latest
    steps:
      - name: "🚀 Thực thi lệnh xóa nhánh qua GitHub API"
        run: |
          TARGET_BRANCH="${{ github.event.inputs.branch_to_delete }}"
          
          # Kiểm tra an toàn: Không cho phép tự xóa nhánh chính
          if [ "$TARGET_BRANCH" = "main" ] || [ "$TARGET_BRANCH" = "master" ]; then
            echo "❌ Lỗi bảo mật: Không được phép xóa nhánh chính ($TARGET_BRANCH)!"
            exit 1
          fi
          
          echo "🔄 Đang tiến hành xóa nhánh: $TARGET_BRANCH ..."
          
          # Gửi lệnh API để xóa nhánh được chọn
          STATUS_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/git/refs/heads/${TARGET_BRANCH}")
          
          if [ "$STATUS_CODE" -eq 204 ]; then
            echo "✅ Thành công: Nhánh [$TARGET_BRANCH] đã bị xóa sổ hoàn toàn!"
          elif [ "$STATUS_CODE" -eq 404 ]; then
            echo "⚠️ Thất bại: Không tìm thấy nhánh [$TARGET_BRANCH] trên hệ thống. Hãy kiểm tra lại tên."
            exit 1
          else
            echo "❌ Lỗi hệ thống: API trả về mã lỗi $STATUS_CODE."
            exit 1
          fi
