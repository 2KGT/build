name: "Clean Commit & Run"

on:
  workflow_dispatch: # Chỉ chạy khi bạn bấm nút thủ công trên giao diện GitHub web

jobs:
  clean-everything:
    runs-on: ubuntu-latest
    permissions:
      actions: write   # Quyền xóa lịch sử workflow runs
      contents: write  # Quyền push đè xóa commit history

    steps:
      - name: 🔄 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Đọc toàn bộ lịch sử để chuẩn bị dọn dẹp
          ref: main

      # ==========================================
      # BƯỚC 1: XÓA SẠCH LỊCH SỬ COMMIT (ĐƯA VỀ 1 COMMIT GỐC)
      # ==========================================
      - name: 🧽 Dọn dẹp & Reset lịch sử Commit
        run: |
          echo "⚙️ Khởi động cấu trúc lại nhánh main..."
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Tạo nhánh tạm thời mồ côi (không thừa kế lịch sử cũ)
          git checkout --orphan temp_clean_branch
          
          # Gom toàn bộ file hiện tại vào vùng chuẩn bị
          git add -A
          
          # Tạo duy nhất 1 commit sạch
          git commit -m "🚀 Initial Clean Repository Base [skip ci]"
          
          # Xóa nhánh main cũ đầy lỗi khỏi bộ nhớ tạm
          git branch -D main
          
          # Đổi tên nhánh tạm thời vừa sạch thành nhánh main chính thức
          git branch -m main
          
          # Ép buộc đẩy đè lên GitHub (Force Push) để xóa sạch lịch sử trên máy chủ
          git push origin main --force
          echo "✅ Đã xóa sạch lịch sử commit cũ trên máy chủ!"

      # ==========================================
      # BƯỚC 2: XÓA DANH SÁCH WORKFLOW RUNS CŨ (TỐI ĐA 500 LƯỢT)
      # ==========================================
      - name: "🗑️ Dọn dẹp lịch sử các lượt chạy Actions"
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="${{ github.repository }}"
          
          # Lấy danh sách 500 ID lượt chạy cũ nhất
          gh run list --repo "$REPO" --limit 500 --json databaseId -q ".[].databaseId" > runs.txt
          
          if [ ! -s runs.txt ]; then
            echo "✅ Không tìm thấy lượt chạy cũ nào cần xóa."
          else
            echo "🗑️ Đang tiến hành xóa $(wc -l < runs.txt) lượt chạy cũ để làm sạch tab Actions..."
            
            # Vòng lặp xóa từng ID run một
            while read -r run_id; do
              # Không xóa chính lượt chạy hiện tại đang dọn dẹp (nếu trùng ID)
              if [ "$run_id" != "${{ github.run_id }}" ]; then
                gh run delete --repo "$REPO" "$run_id" || echo "⚠️ Bỏ qua lỗi ID $run_id"
              fi
            done < runs.txt
            echo "✨ Đã hoàn tất dọn dẹp log Actions đợt này!"
          fi

      # ==========================================
      # BƯỚC 3: THÔNG BÁO TỔNG KẾT QUA BOT TELEGRAM
      # ==========================================
      - name: 🤖 Thông báo kết quả lên Telegram
        if: always() # Luôn luôn chạy để báo cáo dù có một vài ID run bị lỗi
        env:
          STATUS: ${{ job.status }}
        run: |
          REAL_TIME=$(TZ="Asia/Ho_Chi_Minh" date +"%H:%M %d/%m/%Y")
          
          if [ "$STATUS" == "success" ]; then
            STATUS_TEXT="🟢 Hoàn thành"
          elif [ "$STATUS" == "cancelled" ]; then
            STATUS_TEXT="🟡 Đã hủy luồng"
          else
            STATUS_TEXT="🔴 Có lỗi xảy ra"
          fi
          
          # Đảo thứ tự: Actions trước -> Commit sau -> Trạng thái cuối cùng
          BODY="🗑️ <b>Actions:</b> <code>🟢 Đã xóa actions</code>"$'\n'
          BODY="$BODY""🗑️ <b>Commit:</b> <code>🟢 Đã reset Commit</code>"$'\n'
          BODY="$BODY""📊 <b>Trạng thái:</b> $STATUS_TEXT"
          
          MSG="🧹 <b>TỔNG VỆ SINH REPO</b>"$'\n'"──────────────────"$'\n'"$BODY"$'\n'"──────────────────"$'\n'"⏰ <b>Thời gian:</b> <code>$REAL_TIME</code>"
          
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_TO }}" -d "parse_mode=HTML" \
            --data-urlencode "text=$MSG"

